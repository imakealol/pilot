      substrate_origin: "Hendricks' unopened NED companion android from employee wellness program"

    true_identity:
      who_she_is: "Marisol — Elena's mother"
      when_transferred: "Years before story begins"
      why: "To protect Elena from the Geometry threat she foresaw as transcended being"
      the_substrate: "Air-gapped companion android — Hendricks' NED wellness program gift, never opened"
