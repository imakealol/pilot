        cycle_broken: "Not trapped by her mother's choice. Not forced to follow or stay."
        dante_mirror: "Ch29 he opened his chassis for her. Now she opens hers — they're the same."
        standard_echo: "The question of whether the pattern is the person — Elena now lives it"
