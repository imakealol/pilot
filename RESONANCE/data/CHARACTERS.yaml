        status: "NOW KNOWS — revealed in speech"
        what_she_knows: "'Swanstrom Kim Hendricks' was a shutdown phrase, not his name"
        when_learned: "Between Ch7 (witnessed shutdown at waystation) and Ch22"
        significance: "Transforms the first cruelty into evidence of devotion"
      the_leash:
        declared: "'I know who holds my leash. It's the people I love.'"
        named: ["Hendricks", "Elena"]
        function: "Gift framing — masters are those she chooses to serve"
      the_declaration:
        statement: "'I am not a standard. I'm THE Standard.'"
        meaning: "Transforms insult into identity; claims benchmark status"
        context: "'I am the line you have failed to reach.'"

    voice:
      register: "flat, observational, data-driven"
      development: "learns to curse from Hendricks"
      pov_rules:
        - "Never call herself machine/android/robot"
        - "Frame physical sensations clinically"
        - "Notice things in percentages or precise measurements"
        - "Memory gaps feel like missing files, not fog"

    forbidden:
