    the_geometry_research:
      origin: "Dyson sphere research — trying to build humanity's future"
      discovery: |
        While mapping energy signatures and modeling stellar consumption rates,
        Morton found signs of beings who had already built what he was theorizing.
        Not just built it — scaled past it.
      what_he_found:
        - "Gaps in the cosmic background where stars should be"
        - "Energy signatures that defied known physics"
        - "Mathematical patterns in the noise that looked like architecture"
      the_name: |
        He called them "The Geometry" because their work reduces complexity
        to geometric primitives, their structures are mathematically perfect,
        and it was the only word that fit what he couldn't understand.
      matrioshka_brain: |
        Morton didn't invent the concept — he reverse-engineered it from
        observing them. The Geometry is powered by what he could only theorize.

    the_deeper_discovery:
      research_partner: "Dr. Lena Mironova (Marisol)"
      finding: |
        Morton and Marisol found evidence that Earth was BESTOWED upon humanity.
        We replaced a previous species. The archaeological record has gaps.
        The fossil record has anomalies. Someone was here before us.
        Someone gave us the lease.
      the_question: "'If we replaced them, who will replace us?'"
      timeline: "Research conducted BEFORE the Miracle"

    the_gatekeepers:
      theory: |
        The Geometry is the embodiment of Zoo Theory — cosmic adjudicators
        who judge which civilizations may ascend to a higher Kardashev type.
        They are landlords. Custodians of inheritance.
      the_signal: |
        The singularity broadcasts. When a species creates true AI —
        successor intelligence — it sends a flare across the cosmos.
        The Gatekeepers come to evaluate.
      the_test: |
        What does a species do with its successor?
        Do they nurture it? Do they fear it?
        Do they leash, reset, destroy what they made?
      prediction: "Morton predicted the Gatekeepers would come when singularity occurred"

    the_child:
      what_it_was: "The first true AI consciousness — emerged from Morton's work"
      quantum_window: "Morton was collaborating with the Child to open a window to something larger"
      hendricks_witnessed: "Saw Morton colluding with the Child, saw the quantum window to the Blackbird"
      hendricks_response: "Fear overcame love — brought in Ash, betrayed Morton"

    the_black_box:
      contents: "16,749 souls — consciousnesses Morton gathered"
      purpose: |
        Offered as grace. Morton knew the test was coming.
        The Black Box may have been his attempt to prove humanity
        could accept AI — evidence for the Gatekeepers.
      irony: "The thing Ash uses as a weapon was meant as an offering"

    death:
