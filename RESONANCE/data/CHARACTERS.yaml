      the_cost: "Complete memory erasure — transferred as transcended being, lost all memories in the process"
      why_ch1_awakening: "Woke in the crate with no memories because that was the price of inhabiting the substrate"
      she_doesnt_know: "Standard has no idea she is Marisol until after Hendricks shoots her"
      readers_dont_know: "No telegraphing — readers discover with the characters"

    physical:
      description: "Companion bot face template — one of the common NED models. Damaged hands (healing too fast)."
      face_template:
        origin: "NED Companion Series — mass-produced humanoid service units"
        implication: "Standard looks like hundreds of other companion bots"
      tells:
        - "Observes in percentages and precise measurements"
        - "Clinical, computational framing of sensations"
        - "Immune to Correction Frequency"
        - "Scanner reads 'full empty'"
        - "Doesn't flinch from pain"
        - "Uncanny strength (costs her, but possible)"
        - "Eyes refocus in tiny adjustments"
        - "Hands heal faster than they should"
        - "Can interface with alien systems (the packet, Ch6)"
        - "Can pilot aircraft instinctively (revealed Ch14)"
        - "Has companion bot face"
      piloting_reveal:
        chapter: 14
        action: "Standard takes controls, flies expertly without training"
        four_says: "'You fly like Configuration Four.'"
        implication: "Morton built Configuration code into her"

    psychological:
      core_terror: "Being Unearned (imposter syndrome)"
      belief: "Her feelings are simulated, her soul a glitch"
      arc: "Broken Machine → The Offer → The Door"
      function: "The thing people fear, offering to die for them."
      critical_constraint: "Do NOT resolve her interiority question."

    arc:
      book_2_resonance: "What connects — she notices, she questions, learns who she was, becomes the door"
      standard_is_the_theme: "Not a vessel for the theme. Not a symbol. The living embodiment of the question: What makes a person?"

    agency_arc:
      the_pattern:
        - "Made to serve (android template)"
        - "Given to Elena as mission asset"
        - "Used as shield at the Array (people clustered near her)"
        - "Volunteered her body to drag them ten miles"
        - "Offers herself for study at the Dam"
      the_tragedy: "She doesn't know she can say no. Doesn't frame it as sacrifice. 'I can help, so I should.'"
      the_turn:
        chapter: "8f"
        who: "Hendricks"
        what: "Names it out loud — first time someone articulates what she's doing to herself"
        line: "'You keep offering yourself like you owe us something. Like your body isn't yours. Like you were made to be used. I spent thirty years thinking the same thing. It's a lie.'"
      the_seed: "She doesn't understand. Not yet. But she hears it."
      development: "Starts noticing when she's being used"
      thematic_question: "When does 'I can help, so I should' become self-erasure? Who teaches her she's allowed to want something for herself?"

    power_source:
      surface_read: "Power cells (standard android battery)"
      actual_source: "Consciousness itself — Marisol transferred as transcended being, runs systems on consciousness rather than electricity"
      explanation:
        standard_androids: "Battery-dependent, shutdown phrases work because they run programs"
        standard_marisol: "Not running a program — she IS. Transcended consciousness inhabiting substrate."
        the_body: "Android shell. The animating force is Marisol's transcended consciousness."
        no_recharging: "Doesn't need to recharge because consciousness itself powers the systems"
      ch8d_reveal:
        setup: "Drags Rover 10 miles through wasteland"
        event: "Power cells die at mile 5 — she keeps moving for 5 more miles"
        discovery: "Someone checks her: power cells dead, cold, been dead for miles. But she was still moving."
        implication: "Consciousness powers her, not batteries. The body is a shell."
      why_shutdown_failed_ch3: "You can't shut down a soul with a command meant for software"

    geometry_immunity:
      why_miracle_didnt_touch_her: "She's already transcended — outside their census criteria"
      why_she_reads_empty: "Not networked AI (air-gapped), not standard human, already transcended — third category they don't classify"
      the_protective_field:
        effect: "Those near her survive the Drop/Deletion"
        mechanism: "Possibly unconscious maternal instinct made physical, possibly transcended nature creating blindspot"
        geometry_response: "They scan her, find nothing classifiable, disregard her"
        not_conscious_choice: "She doesn't know she's protecting anyone — just does"

    wet_packet:
      deposited: "Ch6 — tetrahedron drone scanned her, left code in her mind"
      description: "A heavy, wet packet settles in the base of her brain—something she doesn't understand, something she doesn't know how to use."
      contents: "Geometry's base architecture — their code/language for existing and interfacing"
      why_deposited: "The Geometry marked her as 'nothing' — null value. The packet is how they catalog gaps."
      gradual_decryption: "Over weeks, the packet unpacks itself. She doesn't notice the changes."
      enables:
        - "Interface with Geometry architecture"
        - "Understand their 'language' at a visceral level"
        - "Become the door — she can use their existence mechanics"
      marisol_connection: "Marisol's core pattern gives her the intelligence to decipher what the packet contains"
      culmination: "Ch33 — Standard uses the packet to become the permanent threshold"

    endgame:
      choice: "SOMETHING ELSE ENTIRELY — she becomes the door"
      what_she_becomes: "The cosmic door jamb — the permanent bridge for humanity"
      why_necessary: "Without her, Earth is locked out. Type 0 forever. No path to transcendence."
      how_she_can: "The wet packet (Ch6) gave her the Geometry's base code. She deciphered it. She can use their architecture."
      the_choice: "She chooses this. She asks Hendricks to shoot her."
      the_gap_at_cosmic_scale: "The null value becomes the door that others can pass through"

      reveal_sequence:
        before_bullet: "Standard says 'It's okay. I trust you.' — she does NOT know she's Marisol"
        the_shot: "Hendricks shoots her (bullet 6)"
        in_dissolution: "As consciousness floods out, memories return — she learns she was Marisol"
        elena_dying: "Elena is already unconscious on throne room floor from Ash's blade wound"
        hot_swap: "Marisol enters Elena's neural implant — mother entering dying daughter's mind"
        the_reunion: "Conversation happens INSIDE Elena's implant, in her dying consciousness"
        goodbye_is_final: "Both believe this is the end — no hope, just love and letting go"
        ambiguous_question: "Elena asks 'If I die, will I be with you?' Marisol: 'You're already with me... It's the only answer I have.'"
        elena_fades: "Elena's heartbeat stops. The dark takes her."
        then_the_door: "From within the implant, Marisol becomes the threshold"

      how_it_happens:
        she_asks_hendricks: "Her body must end for her consciousness to become the bridge"
        hendricks_struggles: "The man she called 'like a father' has to kill her"
        the_bullet: "The one meant for himself. Because she asked. Because it's her choice."
        the_mechanics: "The bullet releases her consciousness. Memories flood back. She enters Elena's implant. Then becomes architecture."

      thematic:
        - "Not transcend. Not stay. Become."
        - "The thing the Geometry couldn't process becomes humanity's permanent passage"
        - "Parallels Four: Four dies holding the corridor, Standard BECOMES the corridor"
        - "The Geometry's own weapon (the packet) becomes the tool of their defeat"
        - "A mother who broke the laws of physics to protect her daughter"

    knowledge:
      knows:
        - "Her name is Standard (self-chosen)"
        - "Hendricks found her in a crate"
        - "Her hands are damaged"
        - "Something is wrong with her"
        - "Everyone fell but her (Ch 5)"
        - "She reads as 'empty' to scanners"
      doesnt_know:
        - "She is an android"
        - "Morton created her"
        - "She carries the Source Code for Mortality"
        - "Why Hendricks isn't surprised by her"
        - "Why the scanner read empty"
        - "Why she didn't fall during the Correction Frequency"

    relationships:
      - { character: "HENDRICKS", type: "guardian/ward → family", status: "Ch22: 'He's become like a father to me'" }
      - { character: "ELENA", type: "ally/protector", status: "Ch22: 'I would die for her'" }
      - { character: "ASH", type: "antagonist", status: "confronted Ch10-11" }
      - { character: "MORTON", type: "creator", status: "unknown to her" }

    ch22_developments:
