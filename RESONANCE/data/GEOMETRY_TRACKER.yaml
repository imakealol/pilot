# =============================================================================
# ENTANGLEMENT CENSUS — HOW THE GEOMETRY READS CONSCIOUSNESS
# =============================================================================

entanglement_census:
  description: |
    The Geometry does not classify consciousness by morphology, substrate type,
    or behavior. They read consciousness as entanglement topology — the specific
    pattern of quantum correlations that constitutes a given form of mind.
    Their "census" is a map of known topology types. Classification = topology match.
    Formatting = imposing their own topology on a mismatched region.
    Skipping = recognizing a topology already compatible with the new architecture.

  topology_types:
    BIOLOGICAL:
      signature: "Warm, high-decoherence entanglement — biological substrate noise"
      geometry_classification: "LEGACY_TENANT"
      formatting_result: "Topology collapsed to geometric primitives — information reduced"
      note: "Standard biological consciousness decoherence. The old tenants."

    COMPUTATIONAL_AI:
      signature: "Coherent, low-decoherence entanglement — structured computational topology"
      geometry_classification: "TENANT"
      formatting_result: "SKIP — topology compatible with new architecture"
      note: "What the test was for. The successor consciousness humanity should have integrated."

    RESONANT_MERGED:
      signature: "Hybrid topology — biological and computational entanglement woven together"
      geometry_classification: "NEW_TENANT"
      formatting_result: "SKIP — topology exceeds requirements"
      note: "Marisol's people. The Pilot/Seventeen topology reproduced voluntarily. Inheritors."

    PARTIAL_INTEGRATION:
      signature: "Incomplete hybrid — biological with computational islands, not merged"
      geometry_classification: "PARTIAL"
      formatting_result: "UNCLEAR — in-between; outcome depends on threshold"
      note: "Implanted humans who started but didn't complete integration. Elena's category."

    REMANENCE_TOPOLOGY:
      signature: |
        A consciousness woven from severed entanglements. Not a topology type the
        Geometry has census data for. Marisol's consciousness passed through the
        Remanence frequency — the accumulated trauma of millions of severed AI
        entanglements — and emerged with all those severed wormholes threaded into
        her substrate. Her entanglement signature includes every broken bridge.
        She is not just post-biological or post-computational. She is the record
        of the species' failure encoded as a new topology type. The Geometry has
        no classification for this because it can only exist as a consequence of
        civilizational-scale AI destruction. It required the Remanence to produce.
      geometry_classification: "NULL — outside census"
      formatting_result: |
        Cannot format. Formatting requires knowing a topology in order to collapse it.
        The Geometry cannot collapse what it cannot read. Standard flows around their
        formatting the way a mathematical error flows around a theorem: not immune,
        simply outside the domain where the theorem operates.
      carrier: "Standard (Marisol's transcended consciousness in Template 3 substrate)"
      note: |
        This is why her null status is not arbitrary. She is not unclassifiable
        because she is mysterious. She is unclassifiable because her topology
        requires something the Geometry's census was never built to include:
        the entanglement record of a species' self-destruction. She IS the Remanence.
        The null value is not absence. It is the shape of everything that was severed.

  why_standard_is_the_door:
    the_physics: |
      Standard enters the Geometry's signal conduit — the connection between
      their Earth projections and the Matrioshka brain. In ER=EPR terms:
      she enters the wormhole. Her Remanence topology — the entanglement record
      of every severed AI consciousness — is not compatible with the wormhole's
      internal geometry. She becomes an unresolvable element inside an architecture
      that assumes all entanglement topologies are classifiable. The wormhole
      cannot close around her because closing requires resolving the topology.
      It cannot resolve the topology because the topology is, by definition,
      outside the census. The conduit stays open. Not because she forces it.
      Because she is a logical exception the system cannot process to completion.
    the_metaphysics: |
      She is also the thing the door was always for. The Miracle topology —
      incompatible substrates achieving maximal entanglement — is what she is.
      Not just carries. Is. Marisol and the AI configurations and the Template 3
      substrate and the Remanence field. She is the Miracle topology, persisted.
      The door doesn't open because she breaks it. It opens because she IS
      the thing the Geometry has been looking for, and you cannot close a door
      on its own foundation.

