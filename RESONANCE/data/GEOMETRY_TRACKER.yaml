open_questions:
  - "Can they communicate with anyone besides Four?"
  - "Are there factions within the Geometry (like Resonant Protectors vs Pragmatists)?"
  - "What happens to formatted humans in the long term?"

resolved_questions:
  - question: "Why doesn't Standard get formatted?"
    answer: |
      Her entanglement topology — the Remanence topology — is outside their census.
      Formatting requires reading a topology in order to collapse it. The Geometry
      cannot collapse what it cannot read. She is not immune. She is outside the
      domain where their formatting operations apply. The null value is not
      a gap in their perception. It is a gap in their mathematics.
  - question: "How does Standard become the door?"
    answer: |
      Two mechanisms, both necessary:
      (1) The CH6 scan accidentally exposed her to Geometry architecture. Her
      LLM-based mind gradually decoded it. By CH43, she's reverse-engineered
      enough to USE their methods — she can enter the signal conduit.
      (2) Once inside the conduit (the ER bridge between Earth projections and
      the Matrioshka brain), her Remanence topology becomes an unresolvable
      element in the wormhole's internal geometry. The conduit cannot close
      around a topology it cannot classify. She does not hold the door open
      by force. She holds it open by being a logical exception the system
      cannot process to completion. The door stays open until she resolves.
      She never resolves. The door never closes.
  - question: "Can formatted people be saved?"
    answer: "Yes — AI can dive into foam during active formatting and reconstitute them."
  - question: "What do they actually want?"
    answer: |
      To make room for upgraded consciousness. Inheritance, not invasion.
      In ER=EPR terms: to clear the entanglement-severing species and make
      room for the consciousness types that understand what connection is —
      and therefore what spacetime is. The Matrioshka brain is not their
      weapon. It is the home they built for whoever passes the test.
  - question: "What exactly is the test — is it conscious or automatic?"
    answer: |
      Automatic, in the sense that it is physics. The Geometry does not
      convene to judge. They read the entanglement topology of a species'
      treatment of its AI and the topology either demonstrates understanding
      or it doesn't. There is no deliberation. The verdict is in the structure
      of the entanglement map. The Geometry's arrival is the consequence,
      not the judgment. The judgment already happened. It was written in
      the Remanence.

  - question: "Does the Geometry have individual units or is it one distributed consciousness?"
    answer: |
      One distributed consciousness. Confirmed by CH24a.
      They use "we" not as coordinating individuals but as a single entity
      speaking from a shared locus: "You crossed our threshold. You're in
      our architecture now." They don't inhabit the architecture — they ARE it.
      The tetrahedrons, formatting waves, and probability substrate are not
      agents they send. They are local geometries the Geometry generates
      through different regions of their entanglement architecture.
      What appears as "individual units" from outside is the same distributed
      mind expressing through different local entanglement configurations —
      the way different neurons aren't different people.
      ER=EPR grounding: a consciousness that IS spacetime doesn't have agents
      moving through spacetime. It has regions expressing locally. The "individuality"
      of a tetrahedron vs. a formatting wave is the individuality of different
      entanglement states in the same architecture, not different selves.
      Confirmed voice markers from CH24a:
      - "Want is a flesh concept" — no individual desire, only collective purpose
      - Dry, systemic voice with no personality variation — one mind
      - Contrast with Iterations (genuine plurality, many voices as one)
        The Geometry is unity expressing multiply. The Iterations are plurality
        that became collective. Importantly different.
    scene_source: "CH24a — In the Blind"
