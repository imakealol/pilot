##############################################################################
# DESIGN NOTES
##############################################################################

design_philosophy: |
  Elena's weapons are modern, efficient, designed for the post-Collapse world
  of faction warfare. They contrast with Hendricks' antique revolver:

  - Her gear HUMS — capacitors, magnetic systems, always a faint whine
  - His gun is SILENT until it fires
  - Her weapons are EFFECTIVE against technology, weak against constructs
  - His revolver works on EVERYTHING because it's just physics

  Her armor is her shell. She's been inside it since page one. The story
  should eventually crack that shell — literal and metaphorical.

ammunition_economy: |
  POST-COLLAPSE WEAPONS use magnetic acceleration:
  - Ferrous bolt rounds (iron-core flechettes)
  - Require capacitor charge to fire
  - No chemical propellant, no gunpowder
  - Silent-ish (crack-hiss vs. BANG)
  - Fail against sonic constructs (pass right through)

  HENDRICKS' REVOLVER is the exception:
  - Chemical propellant cartridges (.45 Schofield)
  - THE LAST BULLETS IN THE WORLD — the 5 rounds at story start are the
    only known chemical propellant cartridges left in existence
  - No one makes gunpowder anymore. No one makes brass casings.
  - LOUD — actual explosion in the chamber
  - Works on everything because it's just mass x velocity
  - No electronics to fail, no capacitor to drain
  - "Museum junk" to scavengers — they don't understand its value

  The revolver's advantage: when the Geometry shuts down electronics,
  when the constructs scatter ferrous rounds, Hendricks has the only
  weapon that still works. But every shot is irreplaceable.

  Started with 5. Used 1 on the Child (Book 1). Used 3 on scavengers (CH4).
  Two remain. One for Ash. One for himself. The last bullets on Earth,
  and he's already spent most of them.

visual_contrast: |
  ELENA: Black armor, multiple weapons, tactical, prepared for war
  HENDRICKS: Civilian clothes, one gun, gray and dying
  STANDARD: Borrowed clothes too big for her, nothing

  The most armed person in the car is the 18-year-old.
