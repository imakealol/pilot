##############################################################################
# RESONANCE: PROPS INVENTORY
# Weapons, ammunition, and tactical gear with established physics
# Created: 2026-01-16
##############################################################################

##############################################################################
# AMMUNITION
##############################################################################

ammunition:

  BOLT_ROUNDS:
    id: "AMM_001"
    name: "Ferrous Bolt Rounds"
    category: ammo
    physical:
      size: "Grain-of-rice (~3mm length, ~0.5mm diameter)"
      mass: "~0.15 grams (1/100th conventional bullet)"
      material: "Iron-core ferrous needle, stabilized micro-flechette"
      distinguishing_features:
        - "Near-invisible to naked eye at speed"
        - "Slight metallic glint when still"
        - "Ferrous content mandatory — non-ferrous won't accelerate"
    function:
      primary: "Anti-personnel ammunition for magnetic acceleration weapons"
      mechanics: |
        VELOCITY COMPENSATES FOR MASS — Kinetic energy = 1/2 mv^2
        - Muzzle velocity: 2,500-3,500 m/s (Mach 7-10)
        - Hypersonic flight creates sharp sonic crack
        - Kinetic energy equivalent to conventional rounds through velocity squared
        - Damage mechanism: Hydrostatic shock + cavitation
        - Wound profile: Small entry, massive internal disruption
      limitations:
        - "Passes through sonic constructs — nothing biological to rupture"
        - "Requires magnetic acceleration — useless in chemical propellant weapons"
        - "Ferrous-only — aluminum or ceramic variants won't fire"
        - "Deflected by strong magnetic fields"
    sensory:
      in_flight: "Sharp crack — hypersonic sonic boom, not weapon report"
      impact_flesh: "Wet thwack — hydrostatic shock audible through tissue"
      impact_armor: "Metallic ping — penetration depends on angle and range"
      impact_construct: "Nothing — needle passes through, no damage"
    thematic:
      symbolism: "Modern warfare — efficient, invisible, impersonal. Death you never see coming."
      callbacks:
        - "CH2 — Elena fires at constructs, rounds pass through harmlessly"
        - "CH39 — 'ferrous bolt rounds, hundreds of them' — the Template 3 barrage"
    contrast_with_revolver: |
      Bolt rounds are everything Hendricks' Schofield is not:
      - Require electronics (capacitor charging)
      - Require network (targeting systems)
      - Fail against constructs
      - Thousands available

      The revolver works because it's DUMB:
      - Chemical propellant, no electronics
      - No network to hack
      - Physics kills everything
      - Five bullets left in existence
    appears_in: [2, 37, 39]

##############################################################################
# PRIMARY WEAPONS
##############################################################################

weapons:

  BURSTMAG_CARBINE:
    id: "WPN_001"
    name: "Burstmag Carbine"
    category: weapon
    manufacturer: "Unknown (pre-Collapse military design)"
    type: "Magnetic acceleration rifle with guided trajectory"
    physical:
      size: "~80cm collapsed, 95cm extended"
      weight: "3.2kg loaded (including capacitor bank)"
      material: "Carbon-fiber chassis, ceramic barrel housing, copper coil assembly"
      distinguishing_features:
        - "Matte black with wear marks at grip and stock"
        - "Collapsible stock locks into shoulder pocket"
        - "Finger grooves worn smooth from use"
        - "Three-point sling attachment"
        - "Capacitor bank housing behind magazine well"
        - "Articulated barrel assembly (allows angle adjustment)"
    function:
      primary: "Anti-personnel carbine, magnetic bolt acceleration with non-linear targeting"
      mechanics: |
        MAGNETIC ACCELERATION SYSTEM:
        - Sequential coil activation propels ferrous needles
        - Muzzle velocity: 2,500-3,000 m/s (Mach 7-9)
        - Magazine capacity: ~300 bolt rounds (1/100th size = 100x capacity)
        - Capacitor bank: ~50 shots per charge
        - RELOAD IS CAPACITOR SWAP, NOT AMMO SWAP
        - Capacitor recharge: 4 hours standard, 30 minutes fast-charge

        VISOR-CARBINE LINK (THE BRAIN):
        - Single-lens visor wirelessly synced to carbine fire control
        - Visor calculates non-linear trajectory in real-time
        - Carbine executes: fires bolt at calculated ANGLE and SPIN
        - Magnetic coils impart precise rotation for curved flight path
        - Result: bolts can curve around partial cover, through gaps, around corners
        - "The visor calculates angles. The pointer marks the path. The rounds follow."
        - The carbine is dumb muscle. The visor is the brain.

        NON-LINEAR SHOT MECHANICS:
        - Visor maps obstacles between shooter and target
        - Calculates required angle and spin to navigate around obstructions
        - Carbine barrel assembly micro-adjusts for launch angle
        - Magnetic coils impart asymmetric spin for curved trajectory
        - At 3,000 m/s, even slight spin creates significant curve over distance

        FIRE MODES:
        - Burst: Three-round, 0.15 second cycle
        - Semi: Single shot
        - Full auto: Disabled (military lockout)

        THE HUM: Capacitor charging between shots — rising whine
      limitations:
        - "Capacitor dependent — 50 shots then swap"
        - "Cold start requires 2-second warm-up"
        - "Ineffective against sonic constructs"
        - "Ferrous rounds only"
        - "Full auto locked out on civilian variants"
        - "Non-linear shots require visor link — blind fire is straight only"
        - "Extreme curves reduce range and impact velocity"
    sensory:
      sound_charging: "Rising whine, like a camera flash warming up — THE HUM"
      sound_firing: "Sharp crack — hypersonic sonic boom, not explosion"
      sound_cycling: "Faint electromagnetic click between rounds"
      sound_impact: "Wet thwack on flesh, metallic ping on armor"
      recoil: "Minimal — magnetic propulsion has no explosive kickback"
      muzzle_signature: "Blue-white flicker at barrel mouth"
      heat: "Barrel housing warm after sustained fire, not hot"
    effectiveness:
      vs_flesh: "Devastating — hydrostatic shock + cavitation"
      vs_armor: "Penetrates standard body armor at close range"
      vs_constructs: "Ineffective — ferrous rounds pass through"
      vs_electronics: "No EMP effect"
    elena_usage:
      primary_weapon: true
      carried: "Slung cross-body when not in use"
      notable_moments:
        - "CH2:11 — drawn entering NED lobby"
        - "CH2 — fires against constructs (ineffective)"
        - "CH9:77-104 — SYSTEM DEMONSTRATED: visor-carbine link shown during scavenger ambush"
        - "CH9:79 — 'Single-lens visor, military-grade... the world splits—one half rain and chaos, the other half data'"
        - "CH9:92 — 'Elena's visor tracks the one going right. Pinpoints the driver through the rain, through the ruins'"
        - "CH9:104 — 'The visor calculates angles. The pointer marks the path. The rounds follow. It's not magic. Just math.'"
        - "CH37:84 — 'Elena checks her carbine. Magazine seated. Safety off.'"
    thematic:
      symbolism: "Modern, efficient, designed by committee — everything Hendricks' revolver is not"
      callbacks:
        - "CH2 — Otis's carbine barks before he dies"
        - "CH96 — 'carbine braced against the rim'"
    appears_in: [2, 37, 39]

  MAGPULSE_SIDEARM:
    id: "WPN_002"
    name: "Magpulse Sidearm"
    category: weapon
    manufacturer: "NED Standard Issue (Morton-era design)"
    type: "Electromagnetic pulse pistol — HEAVY"
    physical:
      size: "22cm length, oversized grip housing capacitor"
      weight: "0.8kg (heavy for a sidearm)"
      material: "Polymer frame, ceramic internals, shielded capacitor core"
      distinguishing_features:
        - "Gray-green standard issue finish"
        - "Ergonomic polymer grip, slightly too small for large hands"
        - "Visible capacitor housing bulge on frame"
        - "Magnetic retention holster compatibility"
        - "Elena's shows wear on grip texture"
    function:
      primary: "Anti-electronics/anti-augment sidearm, neural disruption"
      mechanics: |
        FOCUSED ELECTROMAGNETIC PULSE:
        - Disrupts electronics in targeted cone
        - Causes neural feedback in augmented targets
        - NOT a bolt launcher — pure EM effect

        FIRE MODES:
        - Pulse: Single discharge, instantaneous
        - Sustained: Continuous beam (drains capacitor rapidly)

        POWER SYSTEM:
        - Integrated capacitor: ~20 shots per charge
        - THE HUM: Audible whine when priming (0.5 seconds)
        - Recharge: 4 hours standard, 30 minutes fast-charge
      limitations:
        - "Non-lethal to unaugmented humans"
        - "Limited shots per charge"
        - "Requires priming (0.5s delay)"
        - "Sustained mode drains capacitor in seconds"
    sensory:
      sound_idle: "Faint hum when holstered and charged"
      sound_charging: "Rising whine, mosquito-pitched — THE HUM"
      sound_firing: "Whisper-crack — almost silent compared to bolt weapons"
      sound_sustained: "Haunting low howl"
      visual_firing: "No visible beam — air distortion like heat shimmer"
      recoil: "None"
      target_sensation: "'Brain freeze' sensation in augmented targets"
    effectiveness:
      vs_flesh: "Non-lethal to unaugmented — disorientation, nausea"
      vs_augmented: "Devastating — implant feedback causes seizures, unconsciousness"
      vs_electronics: "Fries unshielded circuits in cone"
      vs_constructs: "Partially effective — disrupts cohesion momentarily"
    elena_usage:
      secondary_weapon: true
      carried: "Thigh holster, right leg (magnetic retention)"
      notable_moments:
        - "CH6:99 — 'Elena draws the magpulse. It's a heavy, ugly weapon.'"
        - "CH6:124 — 'The haunting low howl of the magpulse sustains eternally.'"
        - "CH9:80 — Elena passes it to Hendricks during scavenger chase"
        - "CH10:124 — 'She wishes she didn't leave her magpulse in the Rover'"
    thematic:
      symbolism: "Clean, efficient, corporate — the weapon of the world that was"
      callbacks:
        - "CH3:11 — Hendricks' memory: 'His magpulse had never felt like this'"
        - "CH4:62 — Scavengers' magpulses 'whirr to charge'"
        - "CH35, CH36 — Hendricks reaches for it repeatedly"
    contrast_with_revolver: |
      The magpulse represents everything Hendricks rejected:
      - Electronic dependent
      - Network-capable
      - Requires charging
      - Mass-produced, standard issue

      Hendricks' revolver is the opposite:
      - Purely mechanical
      - Unhackable
      - Always ready
      - Irreplaceable
    appears_in: [3, 4, 6, 9, 10, 11, 15, 29, 35, 36]

  CERAMIC_KNIFE:
    id: "WPN_003"
    name: "Elena's Boot Knife"
    category: weapon
    type: "Ceramic combat knife"
    physical:
      size: "18cm total, 10cm blade"
      weight: "120g"
      material: "Single-piece ceramic, carbon-fiber wrap handle"
      distinguishing_features:
        - "White blade, black handle"
        - "Monomolecular edge — factory-sharp"
        - "No metal components"
        - "Boot-integrated sheath, right ankle"
    function:
      primary: "Silent kill weapon, scanner-invisible backup"
      mechanics: |
        PASSIVE WEAPON — no electronics, no moving parts
        - Monomolecular edge cuts through soft tissue effortlessly
        - Never needs sharpening
        - Invisible to metal detection
        - Passes through body armor seams
      limitations:
        - "Will chip if struck against metal or hard armor"
        - "Cannot penetrate hard plates"
        - "Close range only"
        - "Edge is factory-set — damage is permanent"
    sensory:
      sound_drawing: "Whisper of ceramic against sheath lining"
      sound_cutting: "Silent"
      visual: "White blade catches light — must be used in shadow"
    effectiveness:
      vs_flesh: "Surgical — severs arteries, punctures organs"
      vs_armor: "Armor seam penetration only — cannot breach plates"
      vs_scanners: "Invisible to metal detection"
      vs_constructs: "Useless"
    elena_usage:
      tertiary_weapon: true
      carried: "Right boot, always"
      note: "Last resort — the weapon you don't know she has"
    thematic:
      symbolism: "Silence, patience, close work — the spy's true nature"
      callbacks:
        - "CH37:84 — 'Knife on her thigh' — she's moved it for quick access"
    mirror_to_ash:
      note: "Ash carries a similar ceramic blade — the Prophet and the spy share tools"
      implication: "Elena learned violence from her father's world"
    appears_in: [37]

