        - { item: "FLASH_CHARGES", quantity: 4, location: "Belt pouch, front left" }
        - { item: "MONOFILAMENT_WIRE", quantity: "3 spools", location: "Utility case, back left" }
      mobility:
        - { item: "MAG_GRIP_GLOVES", status: "Worn", location: "Hands" }
      protection:
        - { item: "TERMINIST_ACOUSTIC_ARMOR", status: "Worn, heavily scored, multiple repairs", location: "Full body" }

    ammunition:
      bolt_rounds: "~900 rounds (3 magazines)"
      capacitor_banks: "5 total (3 carbine, 2 sidearm/spare)"

    total_weight: "~20.5kg (8.5kg gear + 12kg armor)"

    armor_tactical_role: |
      THE ARMOR CHANGES HOW SHE FIGHTS:
      - She can advance through suppressing fire
      - She can take hits while closing distance
      - She trades protection for position — armor degrades, she gains ground
      - Each impact is a bruise, a crack, a step closer to failure
      - She's not dodging — she's ABSORBING

      This makes her assault possible:
      - 30 guards with bolt weapons would shred an unarmored target
      - Elena walks through the fire, visor painting targets, carbine cracking
      - By the end, her armor is spider-webbed and failing
      - But she's still standing. And they're not.

    mission_profile: |
      INFILTRATION/EXTRACTION CONFIGURATION
      - Primary: Ranged engagement (carbine)
      - Secondary: Anti-augment/electronics (magpulse)
      - Tertiary: Silent kills (knife, darts)
      - Support: Misdirection (pucks), escape (flash), denial (wire)
      - Mobility: Vertical access (mag-grips)

      DESIGNED FOR:
      - Compound assault
      - Standard extraction
      - Multiple engagement types
      - Extended operation (4-6 hours)

    tactical_philosophy: |
      Elena layers her options:
      1. If she can avoid — echo pucks, misdirection
      2. If she must disable — frequency darts, magpulse
      3. If she must kill — carbine at range, knife up close
      4. If she must escape — flash charges, mag-grips
      5. If she must deny — monofilament traps

      The loadout reflects her spy training: every problem has
      multiple solutions, and the best fight is the one you don't have.

    thematic:
      symbolism: |
        Elena carries the full weight of modern warfare — efficient,
        electronic, networked. Everything her father's Quiet Zone rejects.
        Every piece of gear hums with power. Every weapon requires
        capacitors. She is a walking contradiction: using the technology
        her father fears to rescue the woman he wants dead.
      contrast_with_hendricks: |
        Elena: 8.5kg of gear, dozens of options, all electronic-dependent
        Hendricks: One revolver, two bullets, all mechanical

        Her loadout REQUIRES civilization. His weapon survives its end.

    appears_in: [21, 37]

##############################################################################
# PHYSICS REFERENCE
##############################################################################

physics_framework:

  bolt_round_mechanics:
    principle: "Kinetic energy = 1/2 * mass * velocity^2"
    application: |
      Standard bullet: ~10 grams at ~400 m/s = ~800 joules
      Bolt round: ~0.15 grams at ~3000 m/s = ~675 joules

      1/100th the mass, 7.5x the velocity
      Velocity SQUARED compensates for reduced mass

    why_this_matters: |
      - 300 rounds fit where 3 used to fit
      - Capacitor swap replaces magazine swap
      - Hypersonic crack replaces gunshot bang
      - Hydrostatic shock replaces mass damage

    construct_immunity: |
      Constructs have no biology. Bolt rounds work through:
      - Hydrostatic shock (requires fluid)
      - Cavitation (requires tissue)

      A needle punching through air at Mach 10 does nothing
      to something made of resonant sound waves.

  revolver_contrast:
    hendricks_schofield:
      mechanism: "Chemical propellant (.45 Schofield cartridge)"
      why_it_works: |
        - No electronics to hack or disable
        - No network to compromise
        - No capacitor to drain
        - No frequency to disrupt

        When the Child controlled networked weapons, the Schofield
        was unhackable. ANALOG = UNHACKABLE.

      why_its_rare: |
        No one manufactures gunpowder anymore.
        No one makes brass casings.
        The 6 rounds in Hendricks' revolver were among the last
        chemical propellant cartridges in existence.

        Every shot is irreplaceable.

    thematic_weight: |
      Elena's carbine represents POST-COLLAPSE technology:
      - Efficient, networked, dependent

      Hendricks' revolver represents PRE-COLLAPSE survival:
      - Simple, standalone, independent

      The future forgot how to make the past work.

##############################################################################
# DESIGN NOTES
##############################################################################

design_notes:

  the_hum: |
    Modern weapons HUM. Capacitors charging, magnetic coils priming,
    electronics cycling. Elena's loadout is never silent — there's
    always the faint whine of technology waiting to be used.

    Hendricks' revolver is SILENT until it fires. Then it's the
    loudest thing in any room — an actual explosion, not a crack.

  capacity_vs_scarcity: |
    Elena: ~900 bolt rounds, 5 capacitors, dozens of options
    Hendricks: 2 bullets, one gun, no backup

    She has abundance. He has scarcity.
    Her abundance requires infrastructure. His scarcity is self-contained.

  the_child_lesson: |
    The Child controlled NETWORKED weapons. Turned Hendricks' augmented
    legs against him. Hacked targeting systems. Overrode safeties.

    The Schofield worked because there was nothing to hack.

    This is why Hendricks carries an antique in a world of magnetic
    accelerators. He learned that lesson the hardest way possible.
