##############################################################################
# ARMOR
##############################################################################

armor:

  TERMINIST_ACOUSTIC_ARMOR:
    id: "ARM_001"
    name: "Terminist Acoustic Armor"
    aliases: ["Elena's armor", "acoustic suit", "the blackened armor"]
    category: armor
    manufacturer: "Terminist Order — field-grade combat variant"
    type: "Layered composite ballistic armor with frequency dampening"

    physical:
      coverage: "Full body — boots to high collar"
      weight: "12kg complete"
      material: "Layered composite: ceramic trauma plates, frequency-dampening mesh, lead-lined collar"
      color: "Blackened finish — scorched and worn from prior missions"
      distinguishing_features:
        - "High collar protects neck and base of skull (covers implant)"
        - "Articulated joints for mobility"
        - "Modular plate carriers — can swap damaged sections"
        - "Integrated belt system for gear attachment"
        - "Elena's shows scoring, carbon deposits, old blood in the seams"

    protection:
      bolt_rounds: |
        DESIGNED TO WITHSTAND BOLT FIRE:
        - Ceramic plates disperse hypervelocity impact energy
        - Can absorb 15-20 direct bolt hits before plate failure
        - Frequency-dampening mesh reduces spalling
        - After each hit: micro-fractures accumulate, protection degrades
        - Plate failure is sudden — works until it doesn't

      conventional_weapons: |
        - Stops most conventional projectiles (rare in this era)
        - Bladed weapons deflected by outer shell
        - Blunt trauma still transfers — bruising, cracked ribs possible

      frequency_weapons: |
        - Lead-lined collar blocks neural disruption attacks
        - Mesh dampens ambient frequency interference
        - NOT immune to sustained frequency assault
        - Protects implant from passive scanning

      limitations:
        - "Joint gaps vulnerable — elbows, knees, armpits, groin"
        - "Visor area unprotected (Elena doesn't wear helmet)"
        - "Cumulative damage — each hit weakens overall integrity"
        - "Heat buildup during extended combat"
        - "Weight affects mobility over time"

    damage_progression: |
      THE ARMOR TELLS THE STORY OF THE FIGHT:

      Fresh: Plates intact, full protection
      Light damage: Scoring, surface cracks, cosmetic
      Moderate: Visible fracture lines, protection degraded 30%
      Heavy: Plates spider-webbed, one more hit to failure
      Critical: Sections failing, gaps in coverage

      Elena FEELS each hit — the armor stops penetration but
      transfers kinetic energy. Bruises bloom. Ribs crack.
      She keeps moving because the alternative is dying.

    sensory:
      sound_impact: "Sharp crack as bolt hits plate, then dull thud of energy transfer"
      sound_movement: "Faint creak of articulated joints, whisper of composite layers"
      feel_when_hit: "Like being punched by a freight train through a mattress"
      heat: "Builds during combat — sweat runs inside the suit"
      smell: "Ozone from impacts, old sweat, fear"

    elena_usage:
      worn_since: "CH2 — extraction mission"
      current_state: "Heavily worn, multiple prior repairs, scorched"
      notable_damage:
        - "CH2 — construct encounter scoring"
        - "CH9 — scavenger ambush, took fire"
        - "CH37+ — compound assault, cumulative damage"
      thematic: |
        The armor is Elena's shell — she's been inside it since page one.
        It protects her body but also hides her. The spy in her carapace.
        Every scar on the armor is a death she walked away from.

    tactical_implications: |
      Elena can ADVANCE THROUGH FIRE:
      - She doesn't need to dodge every shot
      - She can cross kill zones that would stop unarmored targets
      - She trades armor integrity for position
      - This makes her terrifying — she walks toward gunfire

      BUT she's not invincible:
      - Each hit costs her future protection
      - Enough hits and she's just meat in a broken shell
      - Smart enemies aim for gaps
      - Sustained fire will kill her — she has to keep MOVING

    contrast:
      vs_standard: "Standard wears borrowed clothes. Elena wears a fortress."
      vs_hendricks: "Hendricks has no armor. He relies on not being shot."
      vs_carbonist_guards: "Ash's people wear lighter gear — faith over firepower"

    appears_in: [2, 5, 6, 9, 16, 17, 21, 22, 37, 39]

