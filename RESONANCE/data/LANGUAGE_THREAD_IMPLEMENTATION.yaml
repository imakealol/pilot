        detail: "Watching followers sign, processing"

  ch20_forty_years:
    language_beats:
      - type: WRITE
        element: "Sign language reveal"
        priority: HIGH
        detail: |
          Follower signs something dismissive/threatening about Standard.
          Standard signs back. Simple but correct.
          Followers freeze. "This machine learns without being taught."
          Ash deeply unsettled.

  ch21_the_execution:
    language_beats:
      - type: WRITE
        element: "Spanish reveal"
        priority: HIGH
        detail: |
          Critical moment — Elena says something in Spanish.
          Standard responds in Spanish. Imperfect but comprehensible.
          Elena stunned. "How long have you...?"
          New dynamic — Standard was always listening.

  ch22_five_minutes_earlier:
    language_beats:
      - type: CHECK
        element: "Standard's Leash Speech"
        detail: "Her most articulate moment — using their vocabulary against them"

