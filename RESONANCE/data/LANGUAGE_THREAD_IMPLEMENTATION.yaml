act_2b_quiet_zone:

  ch16_the_silent_house:
    language_beats:
      - type: WRITE
        element: "Establish sign language"
        priority: HIGH
        detail: |
          Followers communicate in sign.
          Spoken word reserved for Ash/leadership.
          Standard observes — begins absorbing.
      - type: WRITE
