# =============================================================================
# LEGEND
# =============================================================================
#
# WRITE    = New content needed
# EMPHASIZE = Content may exist, needs highlighting/internal beat
# CHECK    = Verify this is present
# CALLBACK = Reference earlier moment
#

# =============================================================================
# ACT 1 (Chapters 1-7)
# =============================================================================

act_1:

  ch01_rude_awakening:
    language_beats: []
    note: "Standard just awakened — baseline English only"

  ch02_the_offerings:
    language_beats:
      - type: CHECK
        element: "Elena/Ash speak Spanish privately"
        detail: "Establish this early if they interact"
    note: "Elena POV — plant Spanish usage if Ash appears"

  ch03_reformat:
    language_beats: []
    note: "Focused on Hendricks/Standard — no language opportunities"

  ch04_standard_issue:
    language_beats:
      - type: EMPHASIZE
        element: "Scavenger speech patterns"
        detail: "Standard notices their dialect differs from Hendricks"

  ch05_the_queue:
    language_beats:
      - type: WRITE
        element: "Trade pidgin in refugee queue"
        detail: "Multiple languages, simplified trade-speak"
      - type: EMPHASIZE
