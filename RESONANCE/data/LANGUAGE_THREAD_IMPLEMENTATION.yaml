        detail: "Religious vocabulary — 'Forgiven', sacred silence"

  ch17_the_sign:
    language_beats:
      - type: EMPHASIZE
        element: "Ash's theological speech"
        detail: "Formal, almost archaic register"
      - type: CHECK
        element: "Sign language in background"
        detail: "Followers signing to each other around Standard"

  ch18_the_craftsman:
    language_beats:
      - type: WRITE
        element: "Spanish between Elena and Ash"
        priority: HIGH
        detail: |
          Private conversation — assume Standard can't understand.
          Plant something significant said in Spanish.
          "No confíes en ella." / "Él no es lo que parece."
      - type: EMPHASIZE
        element: "Standard uses Carbonist phrase correctly"
        detail: "Ash notices — slight unease"

  ch19_the_quiet:
