      - type: CHECK
        element: "Geometry scan sensation"
        detail: "The imprint — something foreign settling in her mind"
    note: "First Geometry exposure — seeds the final payoff"

  ch07_making_the_deposit:
    language_beats:
      - type: WRITE
        element: "Otis mother scene"
        priority: HIGH
        detail: |
          Abbey's sister brings Standard to their dwelling.
          Mother speaks in patterns everyone dismisses.
          Standard listens, then responds to the ACTUAL question.
          "She did. You just have to listen differently."
      - type: EMPHASIZE
        element: "Mechanic/trucker slang"
        detail: "Standard mimics local speech to blend in"
      - type: EMPHASIZE
        element: "Hendricks as 'Sabino' — different register"
        detail: "Standard notices he changes how he speaks"

