language_thread:
  status: WRITE
  priority: HIGH
  elements:
    - element: "Spanish reveal"
      detail: |
        Critical moment — Elena says something in Spanish.
        Standard responds in Spanish. Imperfect but comprehensible.
        Elena stunned. "How long have you...?"
        New dynamic — Standard was always listening.
      significance: |
        - Payoff for Elena/Ash Spanish planted earlier
        - Recontextualizes every private conversation they had around Standard
        - Shows Standard's discretion — she chooses when to reveal what she knows
        - Deepens trust paradox: she understood more than she let on, but didn't betray them
