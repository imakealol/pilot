language_thread:
  status: WRITE
  priority: HIGH
  elements:
    - element: "Sign language reveal"
      detail: |
        Follower signs something dismissive/threatening about Standard.
        Standard signs back. Simple but correct.
        Followers freeze. "This machine learns without being taught."
        Ash deeply unsettled.
      significance: |
        - First proof her ability transcends spoken language
        - If she can decode sign language, she can decode ANY communication system
        - Raises stakes: what ELSE has she absorbed?
        - Clinches the pattern for readers — this is bigger than just picking up dialects
